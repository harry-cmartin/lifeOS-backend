
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:user_db}
quarkus.datasource.username=${POSTGRES_USER:postgres}
quarkus.datasource.password=${POSTGRES_PASSWORD:postgres}

# Ativa a execuÓÐo do Flyway na inicializaÓÐo
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migrations
quarkus.flyway.baseline-on-migrate=true

quarkus.oidc.auth-server-url=http://localhost:8080/realms/life-os
quarkus.oidc.client-id=user-service

quarkus.http.port=8001




